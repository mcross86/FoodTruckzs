# Example Apache2 site for a single-VPS foodtruckzs deployment.
# Replace foodtruckzs.com with the production domain before enabling.
#
# Required modules:
#   sudo a2enmod proxy proxy_http headers rewrite ssl
#
# Enable:
#   sudo cp deploy/apache/foodtruckzs.conf /etc/apache2/sites-available/foodtruckzs.conf
#   sudo a2ensite foodtruckzs
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#   sudo certbot --apache -d foodtruckzs.com -d www.foodtruckzs.com

<VirtualHost *:80>
  ServerName foodtruckzs.com
  ServerAlias www.foodtruckzs.com

  RewriteEngine On
  RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName foodtruckzs.com
  ServerAlias www.foodtruckzs.com

  SSLEngine on
  SSLCertificateFile /etc/letsencrypt/live/foodtruckzs.com/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/foodtruckzs.com/privkey.pem
  Include /etc/letsencrypt/options-ssl-apache.conf

  ProxyRequests Off
  ProxyPreserveHost On
  AllowEncodedSlashes NoDecode
  LimitRequestBody 33554432

  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"

  Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
  Header always set X-Content-Type-Options "nosniff"
  Header always set X-Frame-Options "DENY"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"
  Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

  ErrorLog ${APACHE_LOG_DIR}/foodtruckzs-error.log
  CustomLog ${APACHE_LOG_DIR}/foodtruckzs-access.log combined

  ProxyPass "/api/healthz" "http://127.0.0.1:4000/healthz"
  ProxyPassReverse "/api/healthz" "http://127.0.0.1:4000/healthz"
  ProxyPass "/api/readyz" "http://127.0.0.1:4000/readyz"
  ProxyPassReverse "/api/readyz" "http://127.0.0.1:4000/readyz"
  ProxyPass "/api/" "http://127.0.0.1:4000/api/"
  ProxyPassReverse "/api/" "http://127.0.0.1:4000/api/"

  ProxyPass "/" "http://127.0.0.1:3000/"
  ProxyPassReverse "/" "http://127.0.0.1:3000/"
</VirtualHost>
</IfModule>
